{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:500px;">
    <h2 style="margin-bottom:16px;">Add Department</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-gold">Save Department</button>
    </form>
</div>
<div class="card">
    <h3>Departments</h3>
    <table>
        <tr><th>Name</th><th>Description</th><th>Actions</th></tr>
        {% for d in departments %}
        <tr>
            <td>{{ d.name }}</td><td>{{ d.description }}</td>
            <td><a href="{% url 'department_edit' d.id %}">Edit</a> | <a href="{% url 'department_delete' d.id %}" style="color:#dc3545;">Delete</a></td>
        </tr>
        {% empty %}
        <tr><td colspan="3">No departments yet.</td></tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
