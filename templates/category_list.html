{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:500px;">
    <h2 style="margin-bottom:16px;">Add Category</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-gold">Save Category</button>
    </form>
</div>
<div class="card">
    <h3>Categories</h3>
    <table>
        <tr><th>Name</th><th>Code</th><th>Description</th></tr>
        {% for c in categories %}
        <tr><td>{{ c.name }}</td><td>{{ c.short_code }}</td><td>{{ c.description }}</td></tr>
        {% empty %}
        <tr><td colspan="3">No categories yet.</td></tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
