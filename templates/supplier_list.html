{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:500px;">
    <h2 style="margin-bottom:16px;">Add Supplier</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-gold">Save Supplier</button>
    </form>
</div>
<div class="card">
    <h3>Suppliers</h3>
    <table>
        <tr><th>Name</th><th>Company</th><th>Phone</th><th>Email</th></tr>
        {% for s in suppliers %}
        <tr><td>{{ s.name }}</td><td>{{ s.company_name }}</td><td>{{ s.phone }}</td><td>{{ s.email }}</td></tr>
        {% empty %}
        <tr><td colspan="4">No suppliers yet.</td></tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
