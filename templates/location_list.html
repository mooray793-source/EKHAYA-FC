{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:500px;">
    <h2 style="margin-bottom:16px;">Add Location</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-gold">Save Location</button>
    </form>
</div>
<div class="card">
    <h3>Locations</h3>
    <table>
        <tr><th>Store</th><th>Box</th><th>Notes</th><th>Actions</th></tr>
        {% for l in locations %}
        <tr>
            <td>{{ l.store }}</td><td>{{ l.box_number }}</td><td>{{ l.notes }}</td>
            <td><a href="{% url 'location_edit' l.id %}">Edit</a> | <a href="{% url 'location_delete' l.id %}" style="color:#dc3545;">Delete</a></td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No locations yet.</td></tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
