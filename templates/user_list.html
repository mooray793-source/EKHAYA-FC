{% extends "base.html" %}
{% block content %}
<h2 style="margin-bottom:16px;">User Management</h2>
<a href="{% url 'user_create' %}" class="btn-gold" style="margin-bottom:16px;display:inline-block;">+ Add User</a>
<div class="card">
    <table>
        <tr><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr>
        {% for u in users %}
        <tr>
            <td>{{ u.username }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.profile.role|default:"sales" }}</td>
            <td>
                <a href="{% url 'user_edit_role' u.id %}">Edit Role</a> |
                <a href="{% url 'user_reset_password' u.id %}">Reset Password</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No users found.</td></tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
